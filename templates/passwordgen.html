{% extends '_layout_app.html' %}
{% from '_icons.html' import icon %}

{% block title %}Generator{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Generator</h1>
        <p class="page-sub">Generated in your browser with a cryptographic random source — nothing is sent to the server.</p>
    </div>
</div>

<div class="panel form-panel" id="generator" data-generator>
    <div class="gen-output-row">
        <code class="gen-output" id="gen-output" aria-live="polite"></code>
        <div class="gen-output-actions">
            <button type="button" class="icon-btn" data-gen-refresh aria-label="Regenerate" title="Regenerate">{{ icon('refresh', 15) }}</button>
            <button type="button" class="icon-btn" data-copy-target="gen-output" aria-label="Copy password" title="Copy">
                {{ icon('copy', 15) }}{{ icon('check', 15) }}
            </button>
        </div>
    </div>
    <p class="gen-entropy" data-gen-entropy></p>

    <hr class="divider">

    <div class="field">
        <div class="label-row">
            <label for="gen-length">Length</label>
            <output class="gen-length-value" id="gen-length-value">20</output>
        </div>
        <input type="range" id="gen-length" min="8" max="64" value="20">
    </div>

    <div class="gen-options">
        <label class="check">
            <input type="checkbox" data-gen-set="lower" checked>
            <span>Lowercase <code>a–z</code></span>
        </label>
        <label class="check">
            <input type="checkbox" data-gen-set="upper" checked>
            <span>Uppercase <code>A–Z</code></span>
        </label>
        <label class="check">
            <input type="checkbox" data-gen-set="digits" checked>
            <span>Digits <code>0–9</code></span>
        </label>
        <label class="check">
            <input type="checkbox" data-gen-set="symbols" checked>
            <span>Symbols <code>!@#$%&hellip;</code></span>
        </label>
    </div>
</div>
{% endblock %}
